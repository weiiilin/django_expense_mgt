{% extends 'base.html' %}

{% block title %}Expense MGT | 編輯紀錄{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-7">
    <div class="glass-panel rounded-4 p-4 p-lg-5">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
          <p class="text-uppercase text-secondary small mb-1">REST API Detail</p>
          <h1 class="h3 fw-bold mb-2">編輯第 {{ record.id }} 筆紀錄</h1>
          <p class="text-secondary mb-0">這個頁面會呼叫 GET、PATCH 與 DELETE 端點。</p>
        </div>
        <a href="{% url 'expense_mgt:home' %}" class="btn btn-outline-soft">回列表</a>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">消費類別</label>
          <select id="category" class="form-select">
            <option value="早餐">早餐</option>
            <option value="午餐">午餐</option>
            <option value="晚餐">晚餐</option>
            <option value="交通">交通</option>
            <option value="娛樂">娛樂</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">金額</label>
          <input type="number" id="amount" class="form-control" min="1">
        </div>
        <div class="col-md-6">
          <label class="form-label">消費日期</label>
          <input type="date" id="expense_date" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">備註</label>
          <textarea id="description" class="form-control" rows="4" placeholder="補充說明"></textarea>
        </div>
      </div>

      <div class="d-flex flex-wrap gap-2 mt-4">
        <button type="button" class="btn btn-accent px-4" onclick="updateExpense()">儲存修改</button>
        <button type="button" class="btn btn-outline-danger px-4" onclick="deleteExpense()">刪除紀錄</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  const detailUrl = '{% url "expense_api:expense-detail" record.id %}';

  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) {
      return parts.pop().split(';').shift();
    }
    return '';
  }

  async function loadExpense() {
    const response = await fetch(detailUrl, {
      credentials: 'same-origin'
    });
    const data = await response.json();
    document.getElementById('category').value = data.category;
    document.getElementById('amount').value = data.amount;
    document.getElementById('expense_date').value = data.date;
    document.getElementById('description').value = data.description || '';
  }

  async function updateExpense() {
    const response = await fetch(detailUrl, {
      method: 'PATCH',
      credentials: 'same-origin',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken')
      },
      body: JSON.stringify({
        category: document.getElementById('category').value,
        amount: document.getElementById('amount').value,
        date: document.getElementById('expense_date').value,
        description: document.getElementById('description').value
      })
    });

    if (response.ok) {
      window.location.href = '{% url "expense_mgt:home" %}';
      return;
    }

    const result = await response.json();
    alert(`更新失敗\n${JSON.stringify(result)}`);
  }

  async function deleteExpense() {
    if (!confirm('確定要刪除這筆紀錄嗎？')) {
      return;
    }

    const response = await fetch(detailUrl, {
      method: 'DELETE',
      credentials: 'same-origin',
      headers: {
        'X-CSRFToken': getCookie('csrftoken')
      }
    });

    if (response.ok) {
      window.location.href = '{% url "expense_mgt:home" %}';
      return;
    }

    alert('刪除失敗，請稍後再試。');
  }

  loadExpense();
</script>
{% endblock %}
