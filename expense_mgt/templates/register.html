<head>
    <style>
/* 1. 全螢幕置中容器 */
html, body {
    height: 100%;
    margin: 0;
    background-color: #121212 !important;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

/* 2. 卡片容器：移除所有邊框，增加寬度感 */
.card {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    width: 100%;
    max-width: 400px;
    padding: 0 !important;
}

/* 3. 標題美化 */
h2 {
    font-weight: 800;
    letter-spacing: 2px;
    margin-bottom: 3rem !important;
}

/* 4. 重點：解決橫向排列問題 */
form p {
    display: flex;
    flex-direction: column; /* 強制垂直排列：Label在上，Input在下 */
    align-items: flex-start; /* 靠左對齊 */
    margin-bottom: 2rem !important;
    width: 100%;
}
/* 讓所有輸入框（不論有沒有 class）都變成透明底線 */
input[type="text"], 
input[type="password"], 
.form-control {
    background: transparent !important;
    border: none !important;
    border-bottom: 2px solid #444 !important; /* 底線色 */
    border-radius: 0 !important;
    color: #fff !important;
    width: 100% !important;
    padding: 10px 0 !important;
    margin-top: 5px;
    outline: none !important;
}

/* 點擊時底線變藍色 */
input:focus, .form-control:focus {
    border-bottom-color: #0d6efd !important;
    box-shadow: none !important;
}
/* 5. 標籤 (Label) 美化 */
form label {
    display: block;
    margin-top: 1.5rem !important;
    color: #bbb;
    font-size: 1rem;
    text-align: left;
}

/* 6. 輸入框 (Input) 去除白方框，改為優雅底線 */
.form-control {
    background: transparent !important; /* 移除白色背景 */
    border: none !important;
    border-bottom: 2px solid #333 !important; /* 只留底線 */
    border-radius: 0 !important;
    color: #fff !important;
    padding: 10px 0 !important;
    font-size: 1.1rem;
    width: 100% !important; /* 填滿寬度 */
    transition: border-color 0.3s;
}

.form-control:focus {
    box-shadow: none !important;
    border-bottom-color: #0d6efd !important; /* 點擊時底線變藍 */
}

/* 7. 提示詞 (Help Text) 放在輸入框正下方，靠左顯示 */
.helptext, ul.helptext {
    color: #0dcaf0 !important;
    font-size: 0.85rem;
    text-align: left;
    margin-top: 5px;
    padding: 0;
    list-style: none;
}

/* 8. 按鈕與連結置中 */
.btn-primary, .btn-info {
    display: block;
    width: 100% !important;
    margin: 2rem auto !important;
    border-radius: 50px !important;
    padding: 12px !important;
    font-weight: bold;
}

.mt-3 {
    text-align: center;
    width: 100%;
}
    </style>
</head>

<body class="container py-5" style="background-color: #121212; color: white;">
    <div class="card bg-dark border-secondary p-4 mx-auto" style="max-width: 400px;">
        <h2 class="text-primary mb-4">加入記帳小幫手</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-info w-100">註冊帳號</button>
        </form>
        <p class="mt-3">已有帳號？ <a href="{% url 'expense_mgt:login' %}">點我登入</a></p>
    </div>
</body>
