{% extends "learning_logs/base.html" %}

{% block content %}

  <!-- 註冊表單：送往 accounts:register -->
  <form action="{% url 'accounts:register' %}" method='post'>
    {% csrf_token %}
    <!-- 顯示欄位與驗證錯誤（若有） -->
    {{ form.as_div }}

    <button name="submit">Register</button>
  </form>

{% endblock content %}
