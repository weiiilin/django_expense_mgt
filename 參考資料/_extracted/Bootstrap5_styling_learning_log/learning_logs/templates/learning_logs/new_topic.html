{% extends "learning_logs/base.html" %}

{% block content %}
  <!-- 新增主題表單 -->
  <p>Add a new topic:</p>

  <!-- action 指向同一支 view；POST + CSRF 保護 -->
  <form action="{% url 'learning_logs:new_topic' %}" method='post'>
    {% csrf_token %}
    <!-- form.as_div 讓 Django 自動輸出欄位與錯誤訊息 -->
    {{ form.as_div }}
    <button name="submit">Add topic</button>
  </form>

{% endblock content %}
